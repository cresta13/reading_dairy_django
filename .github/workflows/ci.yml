name: CI HW12 GitHub Actions

on:
  push:
    branches: [ main, HW12-GitHub_Actions ]
  pull_request:
    branches: [ main, HW12-GitHub_Actions ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements/test-or-dev.txt

      - name: Run tests with coverage
        run: pytest -v --cov=diary --cov-report=term-missing --cov-report=lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov